front:
  text: 其白和尚像贊河嶽之鍾生而穎異齠毀知歸性成非習既而踢翩義海喝碎禪天臨濟真燈於焉以傳道唱玉泉麈揮錦水三十餘秋德音萃美鶴林示滅溽暑流金全軀未散定力愈深余以是仰師之道非去來今香國後學寱堂法秀拜題蟠龍山玉泉其白富禪師語録敘通於教者得清淨口辨才輪通於律者得清淨身神通輪通於禪者得清淨意無礙記持輪又教明權實律達開遮禪知縱奪自利利他不假勉力而自綽綽然有餘地矣其白富禪師德玉四十年前干戈隊裏得益之友慈航老人之徒早通般若法華等經繼而棄教升大如律主之堂無何又入昭覺吾兄之室副二全彰階升次第信再來人也得法之後時至理彰龍天四衆推上寶華王座建立法化遂有上堂小參法語拈頌廣録離為三卷其提唱宗乘實從不思議胸中流出并無穿鑿依傍等玼誠有金鑱抉翳點鐵成金手眼然而所長身體力行非文字紙墨中所能載者教耶律耶禪耶階升次第耶並化門應迹之所彰顯不盡者宜另具一隻眼時康熙三十四年補天穿日華巖德玉敬撰序原夫大道本無名待人行之為妙至人不居方臨事能之為然所以滹沱一脈代有其人臨濟三十四葉茂發天童枝榮十二爰我萬峰破山師翁得其一焉于明壬申間負密祖麈拂回蜀宗風丕振布幔天網打鳳羅龍十方衲子望風披靡俾人人鼻孔撩天腳踏實地日闢百里道化益隆自蜀而至秦楚滇黔碁布星分插竿相望不勝枚舉復分一枝落於昭覺本師丈老人派亦繁衍唱道諸方本師再分一葉於蟠龍山玉泉法兄其白富和尚高懸赤轍整頓時機吾兄三慧齊修三學俱煉有時十字街頭教演三乘有時孤峰絶頂拈提向上有時和光同塵大展毗尼故所謂至人不居方在臨事而能之為然也雖有上堂小參頌古法語等偈禁之概不許録而有門人數輩私竊而記成帙乙亥季春玫睿琳睿二法姪負稿東下嘉禾剞劂入於楞嚴藏室壽世豫於癸酉秋奉本師命刊錦江燈録附藏流通事竣云歸玫琳二姪見示佳稿兼以問序豫乃樗櫟之才敢充棟宇堊墁之業詎陳琟琢以吾兄今世門頭猶有下筆處若論向上一著文不加點千聖出頭正眼難窺何處下手請諸方高明者代一轉語看時康熙乙亥浴佛日青城法弟徹生沐手敬撰玉泉寺其白富禪師語録目次卷上序二上堂卷中上堂小參晚參示衆法語機緣像贊卷下拈古示偈開示普説分燈頌古行實書問雜著佛事塔銘附融徹頂禪師語録目次終
