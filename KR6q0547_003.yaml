body:
  text: 嗣法門人明宣等編拈古世尊初生一手指天一手指地周行七步目顧四方云天上天下唯吾獨尊雲門云我當時若見一棒打殺與狗子喫貴圖天下太平拈云調御師向無機處顯大機卻是自相漏逗雲門於本分處不本分禍入私門當時若是坐斷舌頭免致天下人賣弄唇齒百丈野狐拈云不落因果不昧因果一隊無孔鐵鎚道道看有智主人二俱不立世尊一日升座大衆集定文殊白槌云諦觀法王法法王法如是世尊便下座拈云世尊升座向無梯航處設梯航文殊白椎非漸次中言漸次檢點將來煞有淆訛具眼者請向下座處道一句來女子出定拈云三人證龜成鱉則不無怎奈傍觀者哂復云誰是傍觀者世尊在靈山會上拈花示衆是時衆皆默然惟迦葉尊者破顏微笑世尊云吾有正法眼藏涅槃妙心實相無相微妙法門不立文字教外別傳付囑摩訶迦葉拈云世尊拈花靈龜拽尾迦葉微笑影跡難除百萬人天略較些子噫毋借人口換氣世尊於涅槃會上以手摩胸告大衆云汝等善觀吾紫磨金色之身瞻仰取足勿令後悔若謂吾滅度非吾弟子若謂吾不滅度亦非吾弟子時百萬億衆悉皆契悟拈云調御師無端向人天面前撒沙撒土將百萬億人眼睛瞞卻輥入黑暗窟裏還有開眼底麼馬大師因僧問離四句絶百非請師直指西來意師云我今日勞倦不能為汝說問取智藏去僧乃問藏藏云何不問和尚曰和尚教來問藏云我今日頭痛不能為汝說問取海兄僧遂問海海云我到者裏卻不會僧回舉似祖祖云藏頭白海頭黑拈云馬師父子鋒頭太硬將人活埋幸者僧清機險峻且三位老宿都無出身之路你還見抱贓叫屈底人麼陸亙大夫問南泉弟子家中有片石亦曾坐亦曾臥如今欲鐫作佛得麼泉云得得大夫云莫不得麼泉云不得不得拈云南泉善赴來機未免隨人起倒大夫擅弄慣串索也是將錯就錯可憐六月向火炙得鼻頭酸大夫嘗問南泉弟子家中於一瓶內養得一鵝兒今來長大欲出此鵝不得碎瓶不得損鵝未審和尚有何方便泉召云大夫大夫應諾泉云出也拈云南泉老人費許多氣力未免就窠打劫若到玉泉門下便與他和瓶𡇈碎何故聻瞌睡當不得死大梅示徒云來莫可抑往莫可追從容聞鼯鼠聲乃云即此物非他物汝善護持吾當逝矣拈云一是因風吹火一是冒雨撐船且信一半五祖演中節示徒云昔有秀才造無鬼論論就放筆一鬼現身斫額云汝爭奈我何老僧若見以手作鵓鳩嘴向伊道谷谷孤拈云秀才筆尖上墨水未乾打不溼紙五祖一令如敕伏尸萬里玉泉待伊現身云汝爭奈我何呸一聲饒伊手口齊動只道得八成大愚芝示衆云大家相聚喫莖虀若喚作一莖虀入地獄如箭射拈云大小大愚莫謂齒落血流舌頭墮地也不知五祖演云釋迦彌勒猶是他奴且道他是阿誰拈云諸人還識得他麼直饒識得面孔分明未免猶是他奴在何故聻且道他又是誰僧問佛日弼禪師如何是毗盧印弼云草鞋踏雪僧云學人不會弼云步步成跡拈云佛日和尚不辭婆心徹底為人檢點將來未免翻成鈍置忽有人問玉泉如何是毗盧印但言籀字不成文又道學人不會云文彩已彰溈山云老僧百年後向山下作一頭水牯牛左肋書五字云溈山僧某甲此時若喚作溈山僧又是水牯牛喚作水牯牛又是溈山僧且道喚作甚麼拈云以拄杖橫按云溈山僧即今在者裏且道水牯牛在甚麼處卓一卓云溪西雞齊啼南泉兩堂爭貓泉遇之拈起貓云道得即不斬道不得即斬卻衆無語泉便斬之趙州外歸泉舉前話州乃脫草鞋頂頭上便出泉云子若在卻救得貓兒拈云王老師一場漏逗趙州老賊過張弓故臭遍天下無人救得了僧問趙州萬法歸一一歸何處州云我在青州做領布衫重七斤拈云趙州七斤破衲許多翻騰從前不解浣洗至今臭不堪聞僧問藥山平田淺草麈鹿成群如何射得麈中麈山云看箭僧放身便倒山云侍者拖出者死漢僧便走山云弄泥團漢有什麼限拈云百步而止雖死猶活就地而倒喪身失命者僧縱解腦後拔箭待他出頭來也只在草窟裏幌丹霞燒木佛拈云丹霞燒木佛禦寒也如由基箭院主墮落鬚眉正令當行雖然如是得失在甚麼處古者云者一片田地分付來多時也我立地待汝搆去法眼云者一片田地分付來多時也我坐待汝搆去佛果云者一片田地分付來多時也我今當衆慶懺拈云看者三個老漢只謂閒不過賣弄伎倆玉泉也不兢兢吒吒一味取慎逍遙寒燒榾柮撥紅火熱則乘涼把扇搖偈示野雲禪人野雲箭疾任飛騰宇宙橫空絶點塵但得殘霞收拾靜明明獨露一孤輪示潔然禪人一念不生真淨界凝然皎潔更無瑕吾門多少英靈子只為貪求被物遮示元空靜主丈夫立志要超群莫向枯巖學死墩蒲團坐破百千個依前日午打三更示圓靜禪人個事元來本自如闍黎莫謂有親疏和身放下非庸易馳騁徒勞涉異途示心田禪人朝朝何必苦心田費盡機關亦枉然待汝智窮伎倆盡元來滋味一般酸示大癡禪人子湖狗子太無情犯著阿師也斷魂不與闍黎通一線相逢又道少知音示體用禪人有心覓道道轉遐無念怎麼放過他坐斷有無全體用山河大地絶周遮示恆參上座穿衣喫飯非他得一段光明毋自欺未向其中親撒手不知心苦待何時示應徹園頭山家活計钁頭邊時雨時雲莫放閒子若一毫功不及許多園圃入荒煙示湛吟莊主挽定繩頭駕定犁須從方寸把工施鏵頭脫處高睜眼土塊元來本是泥示明本禪者明得本來一段風百千諸佛體皆同子今自不承當也任往雲山幾萬重示峨睿禪彥臨濟家私不覆藏尋常拋放在雲堂個中恨無知音者一喝從教手腳忙示琇睿禪者青年立志欲逃禪切莫隨流涉外緣招手隔江直取去如今此輩罕逢焉示當軒行者賦性溫良真切直行藏卻與世相宜先天一物隱何處多少人來又著疑示琔石禪人此事明明不覆藏當人於此要承當輕輕觸著娘生鼻汗下通身徹骨涼示瑔石牧子顛蹶狂牛一索牽調馴水草漫加鞭挽回自得天真性種月耕風本自然示真誠沙彌立心學道貴真誠溽暑祁寒總一心漆桶驀然箍子脫十方世界露全身示石禪人鑄就一番鐵心腸大凡作用莫尋常腳跟點地非他物本是吾人一段光示瑂石香燈靈源莫待暗昏昏時把心燈晝夜明禪室悠悠光皎潔朗然洞徹本來人示惺石勤策長年行海意如然苦戀工夫志不遷鉢盂有口通消息法門堪作一幡竿示嘯石禪人己事有無己自知神機萬變倩阿誰南泉不是忒無力暗轉繩頭放過渠示𤪤石禪人钁鋤一怲似鋒解用之時活似龍截斷多生塵業網出家方信有全功示岫石禪人粥去飯來從汝用試思喫者是阿誰忽然咬著舌頭血吐出面前紅一堆示玄學上人一筆蘸乾太液池半肩挑盡五湖冰衲僧作略能如是不負當人一片心示慧曉丁居士頂門慧眼曉如日爍破虛空號太玄那個男兒甘自昧揮開萬象別壺天示慧本楊居士個事本來沒甚奇穿衣喫飯現成底到頭一著君須薦妙在呵呵大笑時示慧定張居士兩岸歸來雪滿身一腔風月向誰傾驀然冷地旄星瓊始信從前錯用心示慧光王居士剔起眉毛莫放閒頓除劣勝與談玄冰肌雪骨同梅質水滴年深石也穿維那一日率衆乞開示師云近代禪者多實為生死者少若論此事非大丈夫必不能為也何故聻此段大事因緣乃成佛作祖了脫生死大事豈尋常可得也先要發向上機立向上志發大誓願要信得及放得下話頭乃悟道之根疑情是見地之本時將末法人命轉促無常交參一入幽塗纍劫難出畢竟此生要了明者件大事便得快活自由不被生死業網牽絆倘此生不了有何交涉一息不來轉頭不知是何面孔良可悲也在此勢立千夫難敵之勇百折不回之心詣知識邊或請個話頭或經教未明公案領在八識田中時時參究刻刻提撕勿令斷絶參須真參悟須實悟寒暑不遷其初安危莫奪其志不得賣弄虛頭發言先要誠實只是一念萬年萬年一念如斯參去歲深月久功成果熟時節到來其機自發倏然迸破疑團始得大休大歇也有等機淺之流抱個話頭作個猜謎相似只望求人說破知識婆心豈肯誤賺待自悟去若向此中無下手處自生退悔返不信話頭是悟道之機參禪了脫生死與同流者曰歷代說禪說道者亦未免死亡何故自勞筋骨苦其形軀不如穿些喫些受用些是正經的事大限到來未免一死而已豈有二耶蒼天蒼天此輩愚人乃佛法中大魔自斷命根自投網罟良可嘆也此輩不唯彌勒下生千佛出世不能救也亦是無始劫來業識影子深重不曾遇佛法故有等學人裝點知識賣弄虛頭開口即是機鋒出手便是拈拳胡喝亂喝顯異惑衆順之則喜逆之則怒其知識等與佛齊觀必須究竟使一切人歸正路頭不契其機返生誹謗說知識無冤親平等有愛惡之心即掉臂而去撞入魔黨將古人千七百則公案從頭一一注解設或一聞如箭入心自云此知識才有徹底為人處惜乎乍入宗門之輩披如來衣行天魔事渣滓佛海荊棘祖庭將世尊大全之旨返為戲具也諳兄弟不聞先聖有停餐輟飲廢寢忘勞者有脅不至席立願三年者有十年二十年在此中作活計者至于歷代諸尊宿不勝枚舉豈先哲有賺殺後昆耶衆兄弟及痛念生死大事不憚百里之遙來到蟠龍共守寂寥不得虛過時光各憤勇猛當下了明勘破諸方善知識舌頭也普說師云昨日二十九今朝是三十數目甚分明循環無間息無間息與他覿體不相識師召大衆云且道他是阿誰一僧云謝茶師云喫茶時謝茶不喫茶時又作麼生僧云謝茶師云釘樁搖櫓漢舉臨濟問僧甚處來僧云定州來濟拈棒僧擬議濟便打僧不肯濟云汝已後遇明眼人去在僧後到三聖舉前話聖拈棒僧擬議聖亦打師云者僧決不從定州來何故聻若端的是定州僧何被臨濟傾家破産殃及兒孫也師良久云諸兄弟明眼人前不得錯舉謝茶萬菴以小參普說當供玉泉恰逢淡泊且不妨攀例以表殷勤遂展兩手云和盤托出了也大衆下口著緊防噎殺雲門餅子趙州茶下口方知滋味佳信手拈來輕𡇈碎中有一物不沾牙且道是那一物聻待無人時與伊說分燈融徹圓頂禪人性宗一義諦當觀選佛場開正法筵龍象四來雲集會雲施電卷舞三台慧空智海禪人楚湘行腳渡西軒踏破煙霞任指南當下了明正法眼拈提祖令振三玄融穆圓宗禪人早年離師易他方誘物難老當身益壯歸院祖燈懸玫睿明崑禪人的的西來大意宗流芳千古應無窮一條白棒揮霹靂撥轉娑婆四海龍琳睿明宣禪人法幢高豎在西東任爾爐鎚億萬鎔七尺烏藤吩咐汝撐持祖道仰輝弘頌古世尊初生㘞地一聲海嶽昏何緣自己卻稱尊識來調御舌頭也三界都盧一個人法華云是法住法位世間相常住是法住法位世間相常住水流江漢去雲入紫微都世尊睹明星堆堆黃葉雪峰寒坐久成勞夜夢譫且喜明星刺著眼自尊自大到何年世尊拈花四十九年說盡麼人天衆裏好哥哥頭陀一見呵呵笑放不下兮漏逗何女子出定文殊出不得罔明入不得女子與瞿曇有耳聽不得趙州狗子狗子佛性論有無依然壁上挂葫蘆舌頭墮地君知否辜負高陽酒一壺趙州一日在佛殿上見文遠侍者禮佛以杖打遠一下遠云禮佛也是好事州云好事不如無扶起放倒意若何無端特地起風波棒頭有眼明如日遠老通身挂緣羅萬法歸一一歸何處展鐵旗鼓握霜刃劍一歸何處萬法裏現南泉斬貓南泉據令不尋常白刃臨機孰敢當頭戴草鞋如救得死尸猶不臭諸方嚴陽尊者問趙州一物不將來時如何州云放下著陽云一物不將來放下個甚麼州云放不下擔取去陽當下大悟人人認作現成底無底草鞋付與誰幸荷嚴陽苕帚柄兩手持去掃東西趙州三佛泥佛不度水日炙與風吹形山無處覓那許著眼窺金佛不度爐寒光匝地敷霹靂海門闊含元萬像殊木佛不度火灰飛滿大羅𡇈碎琉璃瓶清光何處無本來面目本來面目隨情應物體取非有用處非無叫呼聲未絶當人已出戶又本來面目隨物應物鴨寒下水雞寒上樹溈山水牯牛莫道溈山不道牛白雲影裏看撐舟輕煙蕩盡狼煙息野水長天一色秋鳥窠吹布毛幸然無事可相酬去路迢迢嶮更憂拈起布毛風電急移山倒海一時休主人公主人公不尋常兩道鐵橫眉一付冷心腸通身無影像遍界不曾藏不曾藏的體全身露堂堂黃龍三關我手何似佛手隨分拈棒弄塵全提殺活臨機逼得須彌倒走我腳何似驢腳動步無非踏著驀地踢翻崑崙白刃紅旗閃爍人人有個生緣吾宗直旨單傳逢人斬頭截角管取血濺梵天佛手驢腳與生緣總取還他一串穿安置中原大唐國風吹日炙到驢年三種師子三種師子不尋當張牙露爪氣如王光吞劍刃錐鋒疾鐵額銅頭也斷腸汾陽三句總頌汾陽三句轉崑崙雲綻青天月到村開合卷舒隨逸目天明依舊又黃昏汾陽三訣第一訣勝奇絶手把無孔鎚敲落一輪月第二訣無言說握柄太阿鋒殺人要見血第三訣一條鐵忽遇謝三郎提起驀頭楔三句第一句的體分明休擬議高著眼百草頭邊祖師意第二句白日青天轟霹靂休側耳直下分明須薦取第三句妙用臨機如箭疾石火光那個男兒知端的浮山九帶總頌九帶全提正令行舌頭墮地眼橫睛臨機突出威音外末後何須再問津正法眼藏世尊不說迦葉不聞祖禰不了殃及兒孫涅槃妙心劫前本自無拘束佛眼何曾識得伊一點圓明無影相恁他南北與東西十智同真十智同真浩太玄就中一點許誰傳千年鰲脊老逾健百尺竿頭任縱橫臨濟四喝一喝金剛劍自揮威風凜凜透坤維輕輕舉動傷鋒手尸橫遍界血星飛一喝師子踞地時玲瓏豈肯穴間棲萬里狐狸潛蹤跡銅頭鐵額也頭低一喝將為探影草皮骨肺肝盡知曉較驗輕重機電急擬思量處枉徒勞一喝不作一喝用鐵蛇鑽入酒糟甕好要分明舉似人秖因舌頭千斤重三要第一要絶朕兆覿面無回互寶鑑當空照第二要無巧妙縱奪機電掣匝地寒光耀第三要深玄奧泥牛吞卻月石虎迎風嘯無鑐鎖四稜著地內空空廓落玄機振祖風世界乾坤都鎖斷中留日月過西東無孔鎚軟似山鋼硬似泥大悲千手亦難提拈來安置芙蓉地無限天龍也皺眉無星稱條條赤體沒些痕曾試青州衫七斤分兩錙銖毫髮叩休將錯認定盤星無孔笛生來格調氣多清不屬陰陽造化成逸興頻吹雪曲韻驚翻石虎望龍吟無縫塔參天兩地影團團突兀無文萬象全卻被耽源委悉後今古無人描得全無絃琴不用斧斤鐫琢成南薰一調了無聲坐中誰是知音客聽取分明韻更清無底鉢快暢團團一鉢盂大庾嶺上是全提人天應供非千手釘飯頻炊接上機無根樹日炙風吹幹不摧挺然卓立合坤維不同萬象增榮茂影覆人天別一枝無底籃不假工夫功自成收藏四海毒龍獰高懸無影枝頭上電閃星馳篩月明無底船呈橈舞棹出前溪帆影橫斜掣電飛逸興蘆花深雪裏滿船空載月明歸行實康熙戊辰長至日首座融徹領大衆入方丈乞師自述行實師云莫揚家醜塗污人耳目衆再三誠請師堅止之至己巳夏佛誕前一日因師病篤徹仍領衆入室復乞示誨師云何勞大衆重重繁瑣師見其殷殷只得對衆拈出余本蜀南眉州人父姓龔諱輔母劉生於天啓七年十二月二十九日午時也齠齔之年一日聞鄉人請法師講金剛經余偕父詣彼法席總無所知至經完提唱世尊捨皇宮入雪山苦行因緣余聞之不勝暢然心中默想使我今生出家如此修行滿我願也遂回白母母峻阻余堅志甚切心中惱悶兩日弗飲父遂問其故母舉吾志白父父曰出家因緣卻非小可恐此子三生有願故出斯言果欲實念設齊送伊出家了其前願余聞此語不勝欣悅於甲戌歲禮古渝慈航主法剃染法名德富侍師恆從講席丁亥歲隨師至遵義開演經期值一禪者提唱悟本禪師幼歲從師念般若心經至無眼耳鼻舌身意處忽以手捫面問師曰某甲有眼耳鼻舌何故言無師驚異曰吾非汝師指往五泄山禮勝默禪師剃落豫聞此語生大慚愧從此放下死心將者公案每每提撕放之不下吾性愚機鈍諦觀教典曲徑多門不得脫灑常隨師方外靜時少亂時多終日懊惱舉措無由費盡心力無一點縫罅被昏散二魔所攪自揣業識深沉三生未獲勳修於佛法中不能悟入遂淚下如雨至次日臨衆聽講物我渾然一切不知至若心有住即為非住少有契入胸中凝滯豁然頓釋轍身出外有禪者曰佛法未周汝出來作麼豫曰將此作佛法會敢保未夢見在僧曰汝具甚麼眼敢恁麼道豫曰道破即不堪僧曰也要大家知豫曰用知作麼僧咄豫便掌自後披閲諸祖語録始知聖道之權實正如空中鳥跡水底魚蹤也期圓隨師至岷山法輪院閲經數載至丁酉辭本師詣圓覺山大如和尚座下圓具遂命演毗尼仍回法輪師命峨眉施茶一夏而歸是時本師染恙藥石罔效豫覽教典昔玄奘曾為師割股之說豫效之是夜人盡時焚香禮拜就左股上割肉煎湯持本師榻前請服本師接著手中嗅而問曰此是何藥豫曰是某善士所採草藥囑人盡時方服本師服之就枕而臥豫侍榻少頃師乃放聲大淚豫胡跪云師何故如斯本師曰吾年八十皆去時也汝何行此苦法欲救吾耶世間一切總屬幻化況色形耶縱使百年亦不免也豫曰德富有何苦法本師曰汝猶瞞我豫夢寐中忽有神人告曰和尚壽算滿矣奈徒行苦行秖延十日也豫泣曰德富欲效前人所行祈師常住在世為衆生津梁也師曰雖則如是爾猶未空豫復禮拜而出本師竟終于己亥春三月十四果旬日也豫送師入塔訖三年服滿辭衆檀越詣灌邑唐家寺開戒壇閒暇披閲子史一日有感曰義學秖益多聞難禦生死生死不了學奚益哉豫便束包行腳參遍諸方後仍旋灌邑值怕參大德以郫筒玉泉虛席請豫主之庚申昭覺丈老人遊崇寧福昌豫偶遇老人把手曰你然何藏在者裏豫曰未曾藏老人呵呵大笑豫禮拜次日老人回昭覺豫歸玉泉老人寄扇一柄書偈云昨過福昌信言行福昌有賊據其門問其所以徵其信曾劫含元殿裏人後省覲老人于昭覺數遭惡辣鉗鎚記為種草以源流杖拂授之偈曰古城遺堞起翔龍出入玉泉萏菡中一聽老僧垂示後風雲雷雨盡相從豫堅辭曰力量輕微難擔大任本師曰近來法門秋晚佛法掃地借重扶持遂拜受之老僧德涼行寡只堪隨緣消舊以終殘喘有效亮座主之志方如願也不憶本邑自覓張居士為期主請開法幸蒙法兄懶石佛冤問潮三位和尚輔弼命豫升座是以聊拈瓣香勉登曲彔木床用報師恩豫赧顏抱愧薰蕕共囿魚目混珠今因諸子必欲老僧納敗缺老僧元來無事殊期露盡家醜重帶枷鎖其末後事付在他時何堪瑣瑣諸子嗣後履踐宗乘切莫作者般去就勿勞久立一衆作禮而退書問復慧菴居士來翰云業海漫漫未委何處是岸此未委二字便是捷徑路頭恰好下手向者裏須下一番精采屏除見聞覺知只教前後際斷任是佛法世法打成一片至無一片影子時節自然不用些毫氣力而信步到岸也此復復嚴先生金山謂東坡先生胸藏萬卷提起父母未生前事茫然無下手處今讀來翰莫謂山僧不識好惡先生亦無下手處總向有無內外中間尋討若向空劫以前領荷可稱敏手切忌閫外打之繞作活計殊不知此事不著者些氣息亦非語言可詮形相可表只一個平懷做去始契其機若論于文學中明此事任君才過李杜志奪項劉到者裏未免無下手處寄楊居士寒則同寒熱則同熱此二語甚是應時應節但未知穿衣喫飯迎賓待客之時曾獲一回汗出徹體清涼否直饒居士與麼去老僧還要問汝上日到玉泉被老僧一掌打落鼻孔未委落在何處即今尋著否耶若尋著與老僧通個消息來若未然再來喫玉泉棒何如復竹浪法兄攔路接人赤心為衆往來衲子無不稱羡古佛也吾師法道源遠流長人天慶幸弟但欽心敬服而已自念年來齟齬延喘日嬰實法門中一無用人也何當吾兄刻念往往貺步玉泉未遑親馳趨謝復東山李長者彩飾祇園金鋪聖地非夙有靈種曾受記莂者曷能發此勝妙心耶真乃居士贊揚法化誠為金湯利己利人一種大悲心也仍蒙不棄山野翰詔遠頒欲祈講論金剛般若以洽群生其奈貧道無文山林樵牧之姿何堪斯任既荷盛念豈便推辭但孤笻瘦影白拂袈裟秖宜寄于林邊詎寧造東山之名藍也來人旋歸肅此奉復雜著挽草堂充裕和尚充公鐵馬出三關踏破乾坤沒底籃一段風流歸故里空留法社賴誰攀挽龍藏大朗和尚七十四年老衲子今朝撒手樂歸西臨行一調還鄉曲唱出威音那畔機光嚴送屢生上座歸寶城相親未久別攜笻默忖從前逸興濃此去雲山千萬疊長天一色月輪同寄鑑徹居士雙飛日月急如梭無耐人生身老何線下不明己分事更於何處出纏痾四威儀山中行緩步出林嶒嶺頭上踏碎一堆雲山中住身窮道眼富覷破來大地無一物山中坐人境俱不奪爛榾柮日燒三兩個山中臥曲肱而枕著猛醒來星斗都驚落結期雲集緇流建法幢全提殺活任施彰厥中賓主無回互人境相忘花雨香笑殺玉泉漏逗機家私徹底挂橫眉傍敲正打於方寸跳出金毛師子兒佛事為素監寺起龕不問去來不涉程途正與麼時如何是素監寺出身句以杖擊龕云倒跨楊岐三腳驢為圓誠禪人起龕頓脫娘生皮袋好個升平世界本自了無幻化生老病死何來指龕云放便倒扶便起星流電激三千里為瑞松禪人起龕秖解任麼去不解任麼來五步雖存七步不活暨解任麼來又解任麼去還他朝遊西天暮歸東土漢始得何故腳跟無線如蓬轉信步渠儂得自由為祐監院火輔弼玉泉招提老婆心切不已驀然打破漏殼皮囊拋向者裏攛炬云老僧助渠三昧火燎卻闍黎鐵面皮為圓參副寺火渠號圓參了聖超凡娑婆知有此苦何緣來此一番下炬云今日當頭不避火也曾幾跳金剛圈為真祥禪人撒骨樹倒藤枯紅爐焰滅弄盡骨董更無漏泄津送長江冰清玉潔拋至江內云掣開骸骨撒波心如淨琉璃含寶月喝一喝為圓賢火郫筒井蟠龍山總是闍黎不二關下炬云火蛇劈面來虛空徹底翻咦塔銘粵稽剎剎誕真拘羅示寂在成周昭穆二王之間彼其時名雖出自西方法未流於震旦自化人來作中天臺以奉之而教興始及秦皇禁沙門室利房等因見金人出戶靈異昭然信從者遂衆嗣是清涼顯節益事尊崇教乃大著焉歷代以來耆臘苾芻傳燈續焰由摩訶迦葉至三十二祖弘忍雖宗門各出而三緣四諦指趣同歸其中之證果登岸得法要而振宗風者莫可殫述直以了悟真空明心見性為上乘界非幻也世之人謂祝髮披緇遂可澄緣淨業不知本來自有夙具功行出乎尋常乃能度愛河而褰欲網光像教以覺群迷不然何成佛作祖之寥寥也繫惟玉泉其白富禪師其庶幾乎師本眉山人也其族姓龔父諱輔母劉誕師于明之丁卯齠齡穎慧敏悟性成會講金剛寶法默契妙旨因而決意空門禮慈航和尚剃染而夙志以酬圓具于大如律師漸修日茂凡諸子史靡不通微一日師感世相無常嘆曰義學秖益多聞難禦生死生死不了學奚益哉遂束包行腳歷遍諸方參丈老人于昭覺老人授師心要大法而紹續焉繼而卓錫郫筒之玉泉開建精藍高懸赤幟是時宗風大振四來者雲興霞委千株育秀萬指圍繞識者謂曹溪正脈唯師任之良有以也且師道韻奇偉素性沖然凡所禮接非道契不偕凡所經行非闡教不出即虎溪惠遠何以過之況磨磚成鏡契馬祖得道之年聚石點頭際竺老談經之日其以證即心即佛者此其時也自是克圓善果道有傳人回首靈山拈花可笑揚鈴隻履了大意于西來息死勞生脫幻形于東土何罣何礙任去任來當前自有解人奚暇向葛藤窩裏再煩饒舌哉雖請偈留偈未免著相于當機而一言再言無非授受之微旨乃知現在涅槃即波羅法會也師偶示微恙門人圓頂入室定省師曰身病本無生因病從緣起病緣不相礙虛空亦復爾是日夜未央師問蓮漏幾許侍僧曰午夜矣師遂索水沐浴訖趺坐說偈曰了悟三空寂寂全無一點巴鼻今朝化緣已滿翻身靠倒須彌言訖奄然而逝因值夏熱炎天之時暑氣流蒸之際軀留弗火面顏不易神光儼然愈勝于生覯睹者咸嘖嘖異之增發聖心時康熙庚午仲夏草七日也殊不知金剛不壞身原無生滅夫豈片晷終朝所能徵其存歿也哉則謂師也沒者真也即夢也抑謂師也存者夢也寧非真乎但色空真界知者幾人不事標題清修莫顯爰并其族貫里氏詳志于碣以為由俗歸真之寶筏也卜真宅于蟠山左腋之陽建窣堵波以祀之因為其銘銘曰去來不可斷至性非明滅雙足已現林而彼自嗚咽光生玉鏡中道茂金輪徹空遺磚石窟徒令蒼苔茁借問蓮花萼阿誰授真訣得渡自能渡江蘆不待折請將方寸因同向牟尼說時康熙壬申正陽月佛誕日漹江賜進士弟子遁菴王庭詔沐手拜撰康熙乙亥仲呂月佛誕日板藏嘉禾楞嚴寺般若坊附藏流通嘉興倪爾繩梓行嘉善李文伯書蟠龍山玉泉融徹頂禪師語録序教中道但落言詮終非實義所以初祖達磨將此公案袖入華夏不用語言文字直指人心見性成佛斯旨傳來久矣信之者似粟如麻體之者星中揀月今我玉泉法姪融徹禪師齠齡剃染不務外學其語言文字置之弗問只知向上一著晝參夜參蘊在胸中依其白和尚椎拂之下四十餘稔一日聞舉風幡話言下打翻漆桶如披雲見日大地平沉始知無量劫前事不異今時所謂元是舊時人不改舊時行履處常用藥山三條篾束取肚皮隨處住山因伊本師其和尚化去紳襟緇素及同門昆仲等請繼玉泉之席迫不得已拽杖歸來遂有垂示機要皆從胸中流出實非語言文字也若論其直指見性之旨而徹公其人焉豫見其履真踐實豈忍默無言哉謹贅數語于辨云時康熙乙亥佛誕日青城竹浪徹生謹識玉泉融徹頂禪師語録嗣法門人明盛明聰等編康熙己巳七月朔一日光嚴鑄顏和尚及紳襟耆舊緇素等請師繼席上堂詣座云不禮彌勒高揖釋迦者到來作麼生行履良久云欲窮千里目更上一重樓便登拈香云此瓣香秉先天正氣奪日月精華爇向爐中供養釋迦文佛歷代祖師伏願燈傳悠遠正眼恆明此一瓣香非形非狀應在機先爇向爐中端為祝延當今皇帝萬歲萬萬歲文武官僚高增祿位伏願佛日與舜日同輝金輪共法輪併轉此一瓣香威音那畔拾來人天衆前拈出供養傳曹溪正脈第三十七世上其下白本師富老和尚用酬法乳斂衣敷座白椎竟僧問如何是死句師云石虎抱兒眠進云如何是活句師云無言童子口吧吧進云如何是不死不活句師云古路無人到清風自往還乃云新成樓閣向南開靈明一點映亭臺當陽剖露人天眼赤體條條適意便豎拂子云還委悉麼如或未然聽取一頌颯颯清風不暫停一回拈起一回新金襴亦自傳迦葉磚頭瓦礫盡知音喝一喝下座辛未結制期主慧惺毛居士設齊請上堂詣座云者個曲彔木覯面無回互舉步任高登踏斷凡聖路遂升拈香云此瓣香植種子威音那畔榮幹于太極之先爇向爐中祝延今上皇帝萬歲萬萬歲當道尊官現前請主伏願元首明哉股肱良哉庶士康哉此一瓣香天莫能覆地莫能載爇向爐中供養前住光嚴得戒大如和尚現住昭覺師翁丈老人用酬毒手之恩此一瓣香生子不萌枝上長在太素峰前今朝落在玉泉手裏第一回拈出供養傳臨濟正宗第三十三世上其下白本師和尚用酬法乳上首白椎云法筵龍象衆當觀第一義師云天上無雙日閻浮有至尊萬年松不老壽算等乾坤衆中還有識此人麼問向上宗乘即不問如何是臨濟家風師便喝進云如何是函蓋乾坤句師云八臂那吒提不起進云如何是截斷衆流句師云鐵蛇橫古路進云如何是隨波逐浪句師云汝問我答進云三句蒙師指慧惺設齊如何相酬師便打乃云今朝十月十五行者考鐘伐鼓玉泉結制上堂驚起魚龍躍舞只將白棒提持大地山河莽鹵坐斷諸佛關鍵綱維從上列祖衲僧擬議思量一棒打折驢腰莫言不道良久云因先師有則未了公案被現前四衆命頂上座出來與先師了卻承慧惺居士合家來山供衆只得因齊慶贊結九旬之期掉轉鎗旗將三連六斷為爐金烏玉兔為鞴亦任金銀銅鐵磚頭瓦礫煉成一片是聖是凡煆成一體總教放出無位真人與山僧同一鼻孔把手並行諸人還識無位真人麼宛脫丘結椎云諦觀法王法法王法如是昭覺雪師翁辦齊命上堂問六門緊閉還有出入者麼師云亂走作麼進云滿天星斗即不問如何是半夜日頭紅師打云頂門薦取乃云金剛正眼照徹十虛心光朗耀萬象全彰所以道昭昭于心目之間相不可睹晃晃于色空之內義不可窮與天地同根萬物一體佛佛授受而授此也祖祖相傳而傳此也葛藤且置即今報恩一句作麼生道棒頭有眼明千古喝下山崩水倒流上堂諸佛本無說祖師未曾聞留下一轉語千古鎮乾坤且道是甚麼語聻喝一喝云今朝冬月一萬卉俱凋悉玉泉爐增焰山門輝佛日驀召衆云是何朕兆良久云庭前生瑞草好事不如無復喝一喝上堂一切法不生一切法不滅森羅及萬象明明熾然說頂上座到者裏有口秪堪挂在壁上上堂喝一喝云于斯薦得一生參學事畢不勞覿體承當其或未然不免矢上加尖去也驀豎拂子云白拈賊無異色以拂子拋下座云拋向前誰識得衆中有識得者麼良久云趙錢孫李周吳鄭王佛成道日上堂調御六載錯用心卻是無繩自縛身睜得眼來花亂墜今朝誤認定盤星阿呵呵會也麼山河大地平如掌萬象森羅總法身上堂問如何是趙州關師便喝進云有佛處不住時如何師云金屑雖貴落眼成翳進云無佛處急走過又作麼生師云潔白地上不許撒沙乃云雲山疊疊錦水洋洋鶯啼鶴唳草秀花香本自現成公案何更覓水淘江昔日圓通老漢不開生藥鋪單賣死貓頭玉泉無藥鋪可開亦無貓頭可賣驀豎拳云只有者個且道與古人相去多少良久云家家明月誰無分處處青山總白雲上堂此事元來要自強拏雲攫霧露堂堂蟠龍山裏家風別放出鯨鱗吼大方喝一喝解制上堂滿散縱橫得自由酬恩報德更無憂雲絲月餌俱收卻任意行藏別世流九十日已前雙垂鼻孔九十日已後鼻孔雙垂即今九十日已滿玉泉無可供養以拂子作此相云秖有者個雲門公案亦任諸人咬嚼顧左右云逢人不得錯舉佛誕大慈法伯懶石和尚送法衣至上堂問世尊初生是何意旨師云師子吼進云生後如何師云無畏說乃云釋迦降誕不肖遠孫無可供養以拂子作相云頂上座只有者個聊表微誠還委悉麼脫或未然更聽一頌頻跨香象降皇宮七步周行稱大雄四十九年曾漏泄拈花微笑浪施功今日蒙大慈法伯和尚專使賜法衣助揚法化驀拈袈裟角云此是昔日大庾嶺頭提不起的落在玉泉手裏如雲普覆似地普擎對衆拈出爛打葛藤紅爐飛雪無棲泊一點恩波散作霖上堂乾坤之內日月之中唯有一物今古攸同敢問大衆是甚麼物聻若識恁麼物還須恁麼人祈齡上堂初分混沌列三才道人無事任徘徊千年嶺畔青松翠水滿池中月自來清明上堂爻象初分瑞氣濃當陽涌出一輪紅棒頭點出威音旨法雨時傾起臥龍毛吞巨海承渠力芥納須彌理事融山家不會論花甲一度山青春又逢小參昨日霜花拂檻前今朝黃葉落翩翩禪人眼底休著屑覷破元來不值錢諸禪德有疑即問知過即改操金剛斧秉智慧劍凡聖到來一刀兩斷做個出格漢子不惟己躬事畢要且不受人瞞小參古德云大疑大悟小疑小悟不疑不悟玉泉不然有疑墮坑落塹有悟撒沙撒土何故聻本自無迷道甚麼悟如鏡中像水中月眼見最分明只是難收攝縱收攝舉似明眼人不得晚參月大有三十月小二十九大衆請喫茶切莫打溼口若還打溼口杖頭劈脊摟示衆玉泉有口也難言坐斷千差亦弗然覿面相承提祖意只教切切悟心田心田悟無邊業海成甘露髑髏常放白毫光有甚佛兮有甚祖示衆今朝二十三推車上竹竿到頭須著力莫待有循環諸禪德向著力處道一句看良久云玉泉恁麼也是矢上加尖示衆時當季冬十五梅花撲面鼓舞木人穿靴歸漢石女帶帽來楚大火焰中轉法輪烘烘烈烈勢難阻煉得須彌無處藏身海神𨁝跳如虎大衆還知麼玉泉到此露全身屈指數來正十五正十五誰人解打虛空鼓示衆玉泉無法亦無禪二六時中好打眠有人問道西來意覿面當機只一拳示衆呈拄杖云老僧拄杖子與諸人說法已竟大衆聞麼良久云不免與諸人頌出拄杖說法為覓知音一句單提海晏河清拽拄杖歸方丈頌古女子出定一段真風絶正偏拋頭露面現倪端那伽大定非出入鼻孔都盧缺半邊丹霞燒木佛覷破浮塵徹底空寒將木佛火來烹金剛舍利名非實帶纍傍觀身爛紅大顛擯首座接拍須還子弟風傍敲正打顯奇工南山下雨北山黑青草池中隱活龍無位真人者個郎當漢分明常相見頭頭境上彰法法塵中現八面絶遮攔十方俱坐斷天上人間尊剎那即周遍住居無相國時復空王殿觀音像應身三島碧波中剎海無邊示面容日度恆沙無量衆聞思修證總皆空咦總皆空婆心切切運悲風初祖像一臉落腮古怪形狀眼空四海君王不讓言語兜兜嗒嗒心體空空蕩蕩見水脫鞋兮蘆花洸漾履水如地兮熊耳山上九年面壁兮人天榜樣道是阿誰達磨和尚又老胡碧眼訪梁王語不投機自主張一葦蘆花江上渡九年面壁接神光接神光千古兒孫滿大唐慈航師翁像八十四年作賊歷遍天涯自得窮盡教乘骨董識取乾坤一色咦要委師翁指趣頻觀海宇風月本師其白老人像吾師之像描亦非真吾師之德贊一弗能曰有兮一塵不立曰無兮橫亙古今若將眼見終難見耳裏觀身不是身大如和尚天地為廬一衲飄然曾經劫火適意逃禪歷遍寰宇垂手入廛欲贊師德于萬斯年聯芳玥睿明盛禪人少年立志要孤窮日用尋常覓己躬但得心空歸及第利生接物續吾宗璐睿明聰禪人年來于此覓行藏氣骨無凡鎮紀綱七尺烏藤分付後拈椎豎拂播諸方明修寂鏡禪人月下傳衣會也麼蟠龍峰有養龍窩他年致雨騰霄漢一曲陽春唱凱歌古林隆玉禪人芒鞋踏上毗盧頂瓦礫磚頭盡放光萬仞峰頭堪獨步祝吾香也喝諸方應緣普聞禪人一志南來始遇吾箭鋒相拄道心孤龜毛一柄親拈付爐鞴宏開任展舒璸睿明慶禪人真風占斷萬機先捉敗虛空喫鐵鞭臨濟綱宗隨倒弄單刀直入萬峰寒偈夜坐清幽子夜踞爐前兀坐衣披星斗寒腦後神光非色相輝騰霄漢碧空懸示隆玉禪人日透玄關唱哩囉燈籠露柱笑呵呵百千三昧全機用一竅通兮百竅和示普聞禪人真機脫略畫堂前覷著令人心膽寒十八童兒堪戲舞月明簾外轉身難示空一禪人佛性有無句總全偷心死盡意便便西來的旨離文字何勞舌上更談玄示明懷行者日用事兒本現前爐灰撥盡骨毛寒大千沙界投針芥八字眉毛額上懸示𤨲睿禪人蟠龍山裏玉泉宮逼得生蛇化活龍且去深山深隱隱雷鳴天外好騰空示徒明崙無明窟裏學參禪總被貢高名利牽若是胸中癡夢破等閒徹底盡拋翻示珴睿禪人把住牢關莫放參一拳拳定只須穿桶箍驀地分明爆橫身宇宙自翛然示丹青清淨國中寂滅土千般萬種從斯出一毫頭上放光明塞滿虛空何所住挽張居士寄跡閻浮數十春萬緣放下歇孤心而今解唱還鄉曲撫掌呵呵笑一聲悼法伯懶和尚裂破乾坤格外新倒騎鐵馬露全身揚鞭直入無生國任運騰騰自主賓佛事為本師入金桶云吾師六十三撒手出玄關一段真消息白雲自往還咦者老漢寸絲不挂灑灑落落不留朕跡作將來眼為寄凡禪人起龕以杖擊云年登八十四撒手歸家去請出入闍維與汝通消息下火以炬打相云八十四年行腳今朝衣線擺脫助渠一把丙丁即此西方極樂呵呵紅爐煉出白蓮開劫外風光飛玄鶴入塔師一喝云狹路相逢怎放得過無縫塔前著眼觀那許藏頭並露腳白雲影裏識端倪從今始證無生樂便入為顯鉢道者火咳唾掉背祖師禪一性圓明徹法源撫掌呵呵登海岸望中隱隱出雲端下火舉火炬云高著眼莫擬議覿面親陳有誰識銀山鐵壁絶遮攔處處縱橫任遊戲老僧助渠一把火紅爐焰裏通消息
